name: Update README stats cards

on:
  schedule:
    - cron: "17 3 * * *" # daily at 03:17 UTC (off-peak; top-of-hour slots get delayed/dropped)
  workflow_dispatch:

concurrency:
  group: update-cards
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&show=reviews&hide=contribs&hide_border=true&card_width=495&line_height=26&title_color=a5b4fc&icon_color=8b7ff5&text_color=c9d1d9&ring_color=a5b4fc&bg_color=0d1117
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide_border=true&card_width=495&title_color=a5b4fc&text_color=c9d1d9&bg_color=0d1117
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&show=reviews&hide=contribs&hide_border=true&card_width=495&line_height=26&title_color=4f46e5&icon_color=6366f1&text_color=24292f&ring_color=4f46e5&bg_color=ffffff
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide_border=true&card_width=495&title_color=4f46e5&text_color=24292f&bg_color=ffffff
          path: profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "urmeo"
          git config user.email "148221893+urmeo@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "updated stats" || exit 0
          git pull --rebase -X theirs origin main
          git push
