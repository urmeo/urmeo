name: Update README stats cards

on:
  schedule:
    - cron: "17 3 * * *" # daily at 03:17 UTC (off-peak; top-of-hour slots get delayed/dropped)
  workflow_dispatch:

concurrency:
  group: update-cards
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide=contribs&hide_border=true&theme=tokyonight&card_width=495&line_height=24
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide_border=true&theme=tokyonight&card_width=495
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide=contribs&hide_border=true&theme=default&card_width=495&line_height=24
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide_border=true&theme=default&card_width=495
          path: profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "urme-b"
          git config user.email "148221893+urme-b@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "updated stats" || exit 0
          git pull --rebase origin main
          git push
